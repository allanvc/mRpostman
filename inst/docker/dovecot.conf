# Minimal Dovecot configuration for the mRpostman IMAP sandbox.
#
# NOT suitable for production use: no TLS, plaintext authentication, and a
# single static password shared by every user. The server is meant to run
# locally, inside a disposable container, for testing and demonstration only.

protocols = imap
listen = *

log_path = /dev/stderr
info_log_path = /dev/stdout

ssl = no
disable_plaintext_auth = no
auth_mechanisms = plain login

# any username authenticates with the password "sandbox"
passdb {
  driver = static
  args = password=sandbox
}

userdb {
  driver = static
  args = uid=vmail gid=vmail home=/srv/mail/%u
}

mail_location = maildir:~/Maildir

# the vmail system user created in the Dockerfile has a uid below Dovecot's
# default threshold of 500
first_valid_uid = 100

namespace inbox {
  inbox = yes
}
